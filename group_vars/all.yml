---
# Label selector used to pick the workers we manage. Skips anything else
# (control-plane, etcd, etc.). The k3s/k8s convention is the
# `node-role.kubernetes.io/worker` label, applied with no value — so we
# select on label *existence*, not on value=true (that would not match).
worker_label: "node-role.kubernetes.io/worker"

# kubectl binary path. Override if installed somewhere unusual.
kubectl_bin: "kubectl"

# kubeconfig: kubectl uses $KUBECONFIG / ~/.kube/config as usual. Under
# systemd, $HOME may not be set — the unit file in deploy/solid/ exports
# Environment=KUBECONFIG=/root/.kube/config explicitly for that case.
# For ad-hoc overrides from the shell:
#   KUBECONFIG=/path/to/config make status

# Drain options for a NAS-shutdown scenario: the NFS export is going away
# regardless, so we want EVERY worker actually empty before halt — not
# "best-effort with PDB-aware skip".
#
# --disable-eviction switches kubectl to the DELETE API instead of the
# EVICTION API, bypassing PodDisruptionBudgets entirely. We learned the
# hard way that Longhorn's instance-manager PDBs (MAX_UNAVAILABLE=0)
# block eviction of every Longhorn pod when more than one node drains,
# so PDB-aware drain just times out and leaves pods running.
#
# --grace-period=60 still gives apps a minute to finish in-flight writes
# (so e.g. databases get to fsync) before they're killed — much safer
# than --grace-period=0, which is effectively SIGKILL.
#
# --timeout=120s caps each node at 2 minutes. With 7 workers sequential
# the worst case is ~14 minutes, comfortably under the systemd unit's
# TimeoutStopSec=900 (15 min).
drain_args:
  - "--ignore-daemonsets"
  - "--delete-emptydir-data"
  - "--force"
  - "--disable-eviction"
  - "--grace-period=60"
  - "--timeout=120s"

# How long to wait for the Kubernetes API to be reachable on startup
# (uncordon path) — useful when the NAS boots before the cluster API
# answers. cordon-drain uses a shorter wait since API must be up.
api_wait_retries_start: 60   # 60 * 5s = 5 min
api_wait_retries_stop: 12    # 12 * 5s = 1 min
api_wait_delay: 5
